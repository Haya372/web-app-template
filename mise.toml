[tools]
actionlint = "1.7.12"
buf = "1.66.1"
gitleaks = "8.30.1"
go = "1.25.6"
golangci-lint = "2.8.0"
node = "24.14.0"
pnpm = "10.30.3"
psqldef = "3.9.7"
semgrep = "1.161.0"
shellcheck = "0.11.0"
zizmor = "1.23.1"

[env]
_.file = '.env.local'

# cspell:ignore worktree worktrees
[tasks."generate"]
description = "Run code generation for the specified layer: backend / frontend / all (default: all)"
run = "bash scripts/generate.sh {{arg(name='layer', default='all')}}"

[tasks."ports:init"]
description = "Initialize and register this worktree's port offset"
run = "bash scripts/ports-init.sh"

[tasks."ports:clean"]
description = "Remove this worktree's port registration"
run = "bash scripts/ports-clean.sh"

[tasks."ports:list"]
description = "Show all registered worktree port assignments"
run = "bash scripts/ports-list.sh"
