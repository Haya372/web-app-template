name: ci-e2e

on:
  pull_request:
    paths:
      - "go-backend/**"
      - "apps/react-frontend/**"
      - "packages/**"
      - "e2e/**"
      - "package.json"
      - ".github/workflows/ci-e2e.yml"
      - "!**.md"

permissions:
  contents: read

jobs:
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b3191a9e8697d40e27c8b1b6d7f39c84e3e # v3.10.0

      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('e2e/package.json') }}

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter e2e exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm --filter e2e test:e2e
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_BASE_URL: http://localhost:8080

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: e2e/playwright-report/
