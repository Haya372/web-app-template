name: ci-apps-next-frontend
on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "buf.gen.yaml"
      - "proto/**"
      - "apps/next-frontend/**"
      - "packages/ui/**"
      - ".github/workflows/ci-apps-next-frontend.yml"
      - ".github/actions/setup-pnpm-workspace/**"
      - "!**.md"

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/next-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace
      - name: Lint
        run: pnpm lint

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/next-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace
      - name: Test
        run: pnpm test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/next-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace
      - name: Generate proto
        run: pnpm generate:proto
      - name: Build
        run: pnpm build
