name: ci-apps-react-frontend
on:
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "apps/react-frontend/**"
      - "openapi/**"
      - ".github/workflows/ci-apps-react-frontend.yml"
      - ".github/actions/setup-pnpm-workspace/**"
      - "!**.md"

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/react-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace
      - name: Check
        run: pnpm check

  test:
    name: test
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/react-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace
      - name: Prebuild
        run: pnpm prebuild
      - name: Test
        run: pnpm test
