# Basic `dependabot.yml` file with
# minimum configuration for two package managers

version: 2
updates:
  # TODO: fix　to suit your requirements
  - package-ecosystem: "gomod"
    directory: "/go-backend"
    open-pull-requests-limit: 2
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
      - "gomod"
    groups:
      gomod:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(go-backend)"

  - package-ecosystem: "docker-compose"
    directory: "/go-backend"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
    commit-message:
      prefix: "chore(go-backend docker)"

  - package-ecosystem: "docker"
    directory: "/go-backend"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
    commit-message:
      prefix: "chore(go-backend docker)"

  - package-ecosystem: "docker-compose"
    directory: "/e2e"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
    commit-message:
      prefix: "chore(e2e docker)"

  - package-ecosystem: "docker"
    directory: "/e2e"
    open-pull-requests-limit: 1
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "dependabot"
    commit-message:
      prefix: "chore(e2e docker)"

  # TODO: fix　to suit your requirements
  - package-ecosystem: "github-actions"
    directory: "/.github"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "dependabot"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(github-actions)"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "dependabot"
      - "node"
    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      production:
        dependency-type: "production"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

      development:
        dependency-type: "development"
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"

    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"